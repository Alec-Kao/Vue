name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install and build frontend
        run: |
          echo "=== Install frontend ==="
          cd client
          npm install
          npm run build
          echo "=== Done build frontend ==="

      - name: Install backend dependencies
        run: |
          echo "=== Install backend ==="
          npm install
          echo "=== Done backend install ==="

      - name: Deploy to EC2 via SSH using Docker
        env:
          PRIVATE_KEY: ${{ secrets.AWS_SSH_KEY }}
        run: |
          echo "$PRIVATE_KEY" > key.pem
          chmod 400 key.pem

          echo "--- Connecting EC2 ---"
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@13.239.37.52 "mkdir -p /home/ubuntu/node-vue-ele-app"

          echo "--- Start SCP (Docker project) ---"

          scp -o StrictHostKeyChecking=no -i key.pem -r docker-compose.yml ubuntu@13.239.37.52:/home/ubuntu/node-vue-ele-app
          echo "--- compose SCP (Docker project) ---"
          scp -o StrictHostKeyChecking=no -i key.pem -r client ubuntu@13.239.37.52:/home/ubuntu/node-vue-ele-app
          echo "--- client SCP (Docker project) ---"
          scp -o StrictHostKeyChecking=no -i key.pem -r server ubuntu@13.239.37.52:/home/ubuntu/node-vue-ele-app
          echo "--- server SCP (Docker project) ---"
          scp -o StrictHostKeyChecking=no -i key.pem -r ubuntu@13.239.37.52:/home/ubuntu/node-vue-ele-app

          echo "--- Start SSH commands (Docker Compose) ---"
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@13.239.37.52 << 'EOF'
            echo "--- SSH CONNECTED ---"
            cd /home/ubuntu/node-vue-ele-app
            echo "--- Building Docker containers ---"
            docker compose down
            docker compose build
            echo "--- Starting containers ---"
            docker compose up -d
            echo "--- DONE DEPLOY ---"
          EOF