name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install and build frontend
        run: |
          cd client
          npm install
          npm run build

      - name: Install backend dependencies
        run: |
          npm install

      - name: Deploy to EC2 via SSH
        env:
          PRIVATE_KEY: ${{ secrets.AWS_SSH_KEY }}
        run: |
          echo "$PRIVATE_KEY" > key.pem
          chmod 400 key.pem
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@13.239.37.52 "mkdir -p /home/ubuntu/node-vue-ele-app"

          scp -o StrictHostKeyChecking=no -i key.pem \
            server.js \
            package.json \
            package-lock.json \
            -r config models routes client \
            ubuntu@13.239.37.52:/home/ubuntu/node-vue-ele-app

          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@13.239.37.52 << 'EOF'
            cd /home/ubuntu/node-vue-ele-app
            npm install
            pm2 restart server.js || pm2 start server.js --name node-app
          EOF